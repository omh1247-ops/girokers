<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIROKERS</title>
  <style>
    :root {
      --bg: #fff;
      --panel: #fff;
      --text: #000;
      --muted: #666;
      --accent: #000;
      --shadow: 0 20px 60px rgba(0,0,0,0.08);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--accent); }
    body { display: flex; height: 100vh; overflow: hidden; }
    .app-shell { display: grid; grid-template-columns: 220px minmax(0, 1fr); width: 100%; height: 100%; }
    .sidebar { background: var(--panel); color: var(--text); padding: 24px 20px 20px; display: flex; flex-direction: column; gap: 14px; position: sticky; top: 0; align-self: start; height: 100vh; overflow-y: auto; }
    .brand h1 { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
    .nav-list { list-style: none; margin: 0; padding: 0; display: block; flex: 1; }
    .nav-link { color: var(--text); text-decoration: none; font-size: 0.88rem; line-height: 1.1; transition: color 180ms ease; display: inline-flex; }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { font-weight: 700; }
    .add-session-btn { border: 1px solid #ddd; background: transparent; color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; width: 100%; text-align: left; margin-top: auto; }
    .add-session-btn:hover { background: #f7f7f7; border-color: #000; }
    .hidden { display: none; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      z-index: 10000;
      padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      width: min(100%, 320px);
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }
    .modal-box h2 {
      margin: 0 0 18px;
      font-size: 1.1rem;
      font-weight: 800;
      color: #111;
    }
    .modal-box form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 0.95rem;
      outline: none;
      color: #111;
    }
    .modal-box .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 6px;
    }
    .modal-box button {
      min-width: 96px;
      padding: 11px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.92rem;
    }
    .modal-box .cancel-btn {
      background: #f2f2f2;
      color: #333;
    }
    .modal-box .submit-btn {
      background: #000;
      color: #fff;
    }
    .gallery-wrap { background: var(--bg); padding: 24px 24px 32px; overflow: auto; position: relative; }
    .drag-overlay { position: absolute; inset: 24px; background: rgba(240, 240, 240, 0.95); border: 3px dashed #999; border-radius: 20px; display: none; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
    .drag-overlay.active { display: flex; }
    .drag-message { color: #333; font-size: 1.5rem; font-weight: 700; text-align: center; padding: 40px; }
    .gallery { column-count: 5; column-gap: 8px; width: auto; }
    .photo-count { text-align: center; padding: 20px; color: #666; font-size: 0.9rem; margin-top: 20px; }
    .photo-card {
      position: relative;
      display: inline-block;
      width: 100%;
      margin: 0 0 20px;
      break-inside: avoid;
      cursor: pointer;
      overflow: visible;
      border-radius: 8px;
      background: none;
    }
    .photo-card img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s ease;
      object-fit: cover;
      margin-bottom: 12px;
    }
    .vote-chip {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      padding: 7px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
      border: none;
      cursor: pointer;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.2s;
      width: auto;
      margin: 0;
    }
    .vote-chip.voted {
      background: #e53935;
      color: #fff;
    }
    .vote-chip .heart {
      font-size: 1.1em;
    }
    .heart-burst { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.95); font-size: 2.2rem; opacity: 0; transition: opacity 180ms ease; pointer-events: none; z-index: 3; }
    .photo-card.voted .heart-burst { opacity: 1; }
    @keyframes heartPop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    .photo-card.vote-animation .heart-burst { animation: heartPop 0.4s ease; }
    @keyframes heartBreak { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2) rotate(10deg); opacity: 0.5; } 100% { transform: scale(0.5) rotate(-10deg); opacity: 0; } }
    .photo-card.unvote-animation .heart-burst { animation: heartBreak 0.4s ease; }
    @keyframes countPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    .vote-chip.pulse { animation: countPulse 0.3s ease; }
    @media (max-width: 1280px) { .gallery { column-count: 4; } }
    @media (max-width: 1024px) { .gallery { column-count: 3; } }
    @media (max-width: 768px) { .app-shell { grid-template-columns: 1fr; } .sidebar { position: relative; height: auto; width: 100%; padding: 20px 16px 16px; order: -1; } .gallery-wrap { padding: 16px 12px 24px; } .gallery { column-count: 2; } }
    @media (max-width: 560px) { .gallery { column-count: 1; } .nav-list { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; } .nav-link { white-space: nowrap; } }
    #photoModal { display: none; position: fixed; z-index: 9999; inset: 0; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); transition: opacity 0.2s; }
    #photoModal.active { display: flex; opacity: 1; }
    #photoModal .modal-backdrop { position: absolute; inset: 0; background: transparent; cursor: pointer; }
    #photoModal .modal-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; max-width: 90vw; max-height: 90vh; background: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); padding: 0; }
    #photoModal .modal-img { max-width: 80vw; max-height: 80vh; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.18); background: #222; object-fit: contain; margin: 0; display: block; }
    #photoModal .modal-close { position: absolute; top: 18px; right: 18px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 2rem; cursor: pointer; z-index: 3; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    #photoModal .modal-close:hover { background: #e53935; }
    .sidebar .session-actions {
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      position: relative;
    }
    .session-menu-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 1.1em;
      padding: 2px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .session-menu-btn:hover {
      background: #f2f2f2;
      color: #000;
    }
    .session-menu-popup {
      display: none;
      position: absolute;
      right: 0;
      top: 22px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      z-index: 20;
      min-width: 90px;
      padding: 4px 0;
    }
    .session-item.open .session-menu-popup {
      display: block;
    }
    .session-menu-popup button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: #222;
      font-size: 0.92em;
      padding: 7px 16px;
      text-align: left;
      cursor: pointer;
      border-radius: 0;
    }
    .session-menu-popup button:hover {
      background: #f7f7f7;
      color: #e53935;
    }
    .photo-card .select-checkbox {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 11;
      width: 22px;
      height: 22px;
      background: #fff;
      border: 2px solid #333;
      border-radius: 5px;
      appearance: none;
      cursor: pointer;
      display: none;
    }
    .photo-card.select-mode .select-checkbox {
      display: block;
    }
    .photo-card .select-checkbox:checked {
      background: #1976d2;
      border-color: #1976d2;
    }
    .photo-card .select-checkbox:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      font-weight: bold;
    }
    .photo-card.selected {
      box-shadow: 0 0 0 3px #1976d2;
    }
    .photo-card.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(25, 118, 210, 0.13);
      pointer-events: none;
      border-radius: 8px;
    }
    .vote-chip:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .gallery-menu-wrapper {
      position: relative;
    }
    .gallery-menu-btn {
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #fff;
      color: #000;
      font-size: 1rem;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .gallery-menu-popup {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      min-width: 170px;
      padding: 8px 0;
      z-index: 20;
    }
    .gallery-menu-wrapper.open .gallery-menu-popup {
      display: block;
    }
    .gallery-menu-popup button {
      width: 100%;
      background: none;
      border: none;
      color: #222;
      font-size: 0.95rem;
      padding: 10px 14px;
      text-align: left;
      cursor: pointer;
    }
    .gallery-menu-popup button:hover {
      background: #f7f7f7;
      color: #000;
    }
    .gallery-menu-popup .delete-action {
      color: #e53935;
    }
    .gallery-header .photo-count {
      color: #666;
      font-size: 0.9rem;
    }
    .upload-progress {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      z-index: 10000;
      display: none;
    }
    .upload-progress.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><h1>GIROKERS</h1></div>
      <ul class="nav-list" id="navList"></ul>
      <button class="add-session-btn" id="addSessionBtn" type="button">+ 출사 추가</button>
    </aside>
    <main class="gallery-wrap" id="galleryWrap">
      <div class="drag-overlay" id="dragOverlay"><div class="drag-message">📸 여기에 사진을 드롭하세요</div></div>
      <div class="gallery-header">
        <div class="photo-count" id="photoCount">사진 0개</div>
        <div class="gallery-menu-wrapper" id="galleryMenuWrapper">
          <button class="gallery-menu-btn" id="galleryMenuBtn" type="button">⋯</button>
          <div class="gallery-menu-popup" id="galleryMenuPopup">
            <button id="toggleSelectBtn" type="button">사진 선택</button>
            <button id="deleteSelectedBtn" class="delete-action" type="button" disabled>선택 삭제 (0개)</button>
          </div>
        </div>
      </div>
      <div class="gallery" id="gallery"></div>
    </main>
  </div>
  <div class="modal-overlay hidden" id="sessionModal">
    <div class="modal-box">
      <h2 id="sessionModalTitle">출사 추가</h2>
      <form id="sessionModalForm">
        <input id="modalSessionLocation" type="text" placeholder="장소" required />
        <input id="modalSessionDate" type="text" placeholder="날짜 (MMDD)" required />
        <div class="modal-actions">
          <button type="button" class="cancel-btn" id="cancelSessionModal">취소</button>
          <button type="submit" class="submit-btn" id="saveSessionBtn">추가</button>
        </div>
      </form>
    </div>
  </div>
  <div class="upload-progress" id="uploadProgress">
    <div id="uploadMessage">업로드 중...</div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, set, get, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDXhpG3hRcVwZjW6FH560zgjKEX1xS0aG0",
      authDomain: "girokers.firebaseapp.com",
      databaseURL: "https://girokers-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "girokers",
      storageBucket: "girokers.firebasestorage.app",
      messagingSenderId: "1197990109",
      appId: "1:1197990109:web:af159ff61f2063a4b43b34"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let userId = localStorage.getItem('girokers_userId');
    if (!userId) {
      userId = `user-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
      localStorage.setItem('girokers_userId', userId);
    }

    // 🔥 사진 압축 함수
    function compressImage(file, maxWidth = 1200, quality = 0.7) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            canvas.toBlob((blob) => {
              const compressedReader = new FileReader();
              compressedReader.onloadend = () => resolve(compressedReader.result);
              compressedReader.readAsDataURL(blob);
            }, 'image/jpeg', quality);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    const ADMIN_PASSWORD = 'audgns12';
    const gallery = document.getElementById('gallery');
    const galleryWrap = document.getElementById('galleryWrap');
    const dragOverlay = document.getElementById('dragOverlay');
    const photoCount = document.getElementById('photoCount');
    const navList = document.getElementById('navList');
    const addSessionBtn = document.getElementById('addSessionBtn');
    const sessionModal = document.getElementById('sessionModal');
    const sessionModalTitle = document.getElementById('sessionModalTitle');
    const sessionModalForm = document.getElementById('sessionModalForm');
    const modalSessionLocationInput = document.getElementById('modalSessionLocation');
    const modalSessionDateInput = document.getElementById('modalSessionDate');
    const cancelSessionModal = document.getElementById('cancelSessionModal');
    const saveSessionBtn = document.getElementById('saveSessionBtn');
    const galleryMenuWrapper = document.getElementById('galleryMenuWrapper');
    const galleryMenuBtn = document.getElementById('galleryMenuBtn');
    const galleryMenuPopup = document.getElementById('galleryMenuPopup');
    const toggleSelectBtn = document.getElementById('toggleSelectBtn');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const uploadProgress = document.getElementById('uploadProgress');
    const uploadMessage = document.getElementById('uploadMessage');
    let dragCounter = 0;

    let sessions = [];
    const state = {
      filter: '',
      votedIds: [],
      selectMode: false,
      selectedPhotos: [],
      editSessionId: null,
      activeMenuSession: null,
      galleryMenuOpen: false,
    };

    function loadData() {
      const sessionsRef = ref(db, 'sessions');
      onValue(sessionsRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
          sessions = Array.isArray(data) ? data : Object.values(data);
          if (!state.filter && sessions.length > 0) {
            state.filter = sessions[0].id;
          }
        } else {
          sessions = [{
            id: 'session-1',
            number: 1,
            location: '을지로',
            date: '0510',
            photos: []
          }];
          const sessionsObj = {};
          sessionsObj['session-1'] = sessions[0];
          set(sessionsRef, sessionsObj);
          state.filter = 'session-1';
        }
        if (Array.isArray(sessions) && sessions.length > 0) {
          renderNav();
          renderGallery();
        }
      });

      const votesRef = ref(db, `votes/${userId}`);
      onValue(votesRef, (snapshot) => {
        const data = snapshot.val();
        state.votedIds = data ? Object.keys(data) : [];
        if (Array.isArray(sessions) && sessions.length > 0) {
          renderGallery();
        }
      });
    }

    async function saveSessions() {
      const sessionsRef = ref(db, 'sessions');
      const sessionsObj = sessions.reduce((acc, s) => ({ ...acc, [s.id]: s }), {});
      await set(sessionsRef, sessionsObj);
    }

    async function handleVote(photoId) {
      const voteRef = ref(db, `votes/${userId}/${photoId}`);
      const photoVotesRef = ref(db, `photoVotes/${photoId}`);
      
      if (state.votedIds.includes(photoId)) {
        await remove(voteRef);
        const snapshot = await get(photoVotesRef);
        const currentCount = snapshot.val() || 0;
        await set(photoVotesRef, Math.max(0, currentCount - 1));
      } else {
        await set(voteRef, true);
        const snapshot = await get(photoVotesRef);
        const currentCount = snapshot.val() || 0;
        await set(photoVotesRef, currentCount + 1);
      }
    }

    async function getVoteCount(photoId) {
      const photoVotesRef = ref(db, `photoVotes/${photoId}`);
      const snapshot = await get(photoVotesRef);
      return snapshot.val() || 0;
    }

    function getPhotos() {
      const session = sessions.find((item) => item.id === state.filter);
      return session && Array.isArray(session.photos) ? session.photos : [];
    }

    function renderNav() {
      if (!Array.isArray(sessions)) {
        navList.innerHTML = '';
        return;
      }
      
      navList.innerHTML = sessions
        .map(
          (session) => `
          <li class="session-item${state.activeMenuSession === session.id ? ' open' : ''}" data-id="${session.id}">
            <a class="nav-link${session.id === state.filter ? ' active' : ''}" href="#" data-id="${session.id}">${session.number}회 - ${session.location} ${session.date}</a>
            <span class="session-actions">
              <button class="session-menu-btn" type="button" data-id="${session.id}" aria-label="출사 메뉴">⋯</button>
              <div class="session-menu-popup">
                <button class="edit-session-btn" type="button" data-id="${session.id}">수정</button>
                <button class="delete-session-btn" type="button" data-id="${session.id}">삭제</button>
              </div>
            </span>
          </li>`
        )
        .join('');
      
      navList.querySelectorAll('.nav-link').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          state.filter = link.dataset.id;
          state.activeMenuSession = null;
          state.selectMode = false;
          state.selectedPhotos = [];
          renderNav();
          renderGallery();
        });
      });
      
      navList.querySelectorAll('.session-menu-btn').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const sessionId = button.dataset.id;
          state.activeMenuSession = state.activeMenuSession === sessionId ? null : sessionId;
          renderNav();
        });
      });
      
      navList.querySelectorAll('.edit-session-btn').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const sessionId = button.dataset.id;
          editSession(sessionId);
        });
      });
      
      navList.querySelectorAll('.delete-session-btn').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const sessionId = button.dataset.id;
          deleteSession(sessionId);
        });
      });
    }

    function renderGalleryMenu() {
      galleryMenuWrapper.classList.toggle('open', state.galleryMenuOpen);
      toggleSelectBtn.textContent = state.selectMode ? '선택 취소' : '사진 선택';
      if (state.selectMode) {
        deleteSelectedBtn.style.display = 'block';
        deleteSelectedBtn.disabled = state.selectedPhotos.length === 0;
        deleteSelectedBtn.textContent = `선택 삭제 (${state.selectedPhotos.length}개)`;
      } else {
        deleteSelectedBtn.style.display = 'none';
      }
    }

    function toggleSelectMode() {
      state.selectMode = !state.selectMode;
      if (!state.selectMode) {
        state.selectedPhotos = [];
      }
      state.galleryMenuOpen = false;
      renderGallery();
    }

    function togglePhotoSelection(photoId) {
      const index = state.selectedPhotos.indexOf(photoId);
      if (index >= 0) {
        state.selectedPhotos.splice(index, 1);
      } else {
        state.selectedPhotos.push(photoId);
      }
      renderGallery();
    }

    async function deleteSelectedPhotos() {
      if (!state.selectedPhotos.length) return;
      const password = prompt('선택 삭제를 위해 관리자 비밀번호를 입력하세요:');
      if (password !== ADMIN_PASSWORD) {
        alert('비밀번호가 틀렸습니다.');
        return;
      }
      if (!confirm(`선택한 ${state.selectedPhotos.length}개의 사진을 삭제하시겠습니까?`)) return;
      
      const session = sessions.find((item) => item.id === state.filter);
      if (!session) return;
      session.photos = session.photos.filter((photo) => !state.selectedPhotos.includes(photo.id));
      state.selectedPhotos = [];
      state.selectMode = false;
      state.galleryMenuOpen = false;
      await saveSessions();
      renderGallery();
      renderGalleryMenu();
    }

    function editSession(sessionId) {
      const session = sessions.find((item) => item.id === sessionId);
      if (!session) return;
      const password = prompt('출사 수정을 위해 관리자 비밀번호를 입력하세요:');
      if (password !== ADMIN_PASSWORD) {
        alert('비밀번호가 틀렸습니다.');
        return;
      }
      state.editSessionId = sessionId;
      openSessionModal('edit', session);
      state.activeMenuSession = null;
      renderNav();
    }

    async function deleteSession(sessionId) {
      const password = prompt('출사 삭제를 위해 관리자 비밀번호를 입력하세요:');
      if (password !== ADMIN_PASSWORD) {
        alert('비밀번호가 틀렸습니다.');
        return;
      }
      if (!confirm('정말 삭제하시겠습니까? 이 출사의 모든 사진도 함께 삭제됩니다.')) return;
      
      const index = sessions.findIndex((item) => item.id === sessionId);
      if (index === -1) return;
      sessions.splice(index, 1);
      await saveSessions();
      
      if (state.filter === sessionId) {
        state.filter = sessions[0]?.id || '';
      }
      state.activeMenuSession = null;
      renderNav();
      renderGallery();
    }

    async function renderGallery() {
      if (!Array.isArray(sessions) || sessions.length === 0) {
        photoCount.textContent = '사진 0개';
        gallery.innerHTML = '';
        renderGalleryMenu();
        return;
      }
      
      const photos = getPhotos();
      photoCount.textContent = `사진 ${photos.length}개`;
      
      if (photos.length === 0) {
        gallery.innerHTML = '';
        renderGalleryMenu();
        return;
      }
      
      const photosWithVotes = await Promise.all(
        photos.map(async (photo) => {
          const voteCount = await getVoteCount(photo.id);
          return { ...photo, votes: voteCount };
        })
      );
      
      gallery.innerHTML = photosWithVotes
        .map(
          (photo) => `
        <article class="photo-card ${state.votedIds.includes(photo.id) ? 'voted' : ''} ${state.selectMode ? 'select-mode' : ''} ${state.selectedPhotos.includes(photo.id) ? 'selected' : ''}" data-id="${photo.id}">
          <input class="select-checkbox" type="checkbox" ${state.selectedPhotos.includes(photo.id) ? 'checked' : ''} aria-label="사진 선택" />
          <img class="photo-img" src="${photo.imageUrl}" alt="${photo.title || ''}" loading="lazy" onerror="this.src='https://via.placeholder.com/900x1200?text=No+Image'" />
          <button class="vote-chip${state.votedIds.includes(photo.id) ? ' voted' : ''}" type="button" ${state.selectMode ? 'disabled' : ''}>
            <span class="heart">♥</span> <span class="vote-num">${photo.votes}</span>
          </button>
          <div class="heart-burst">♥</div>
        </article>`
        )
        .join('');
      
      renderGalleryMenu();
      
      gallery.querySelectorAll('.photo-img').forEach((img) => {
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = img.closest('.photo-card');
          const photoId = card.dataset.id;
          if (state.selectMode) {
            togglePhotoSelection(photoId);
          } else {
            openModal(img.src, img.alt);
          }
        });
      });
      
      gallery.querySelectorAll('.select-checkbox').forEach((checkbox) => {
        checkbox.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = checkbox.closest('.photo-card');
          togglePhotoSelection(card.dataset.id);
        });
      });
      
      gallery.querySelectorAll('.photo-card').forEach((card) => {
        const voteBtn = card.querySelector('.vote-chip');
        const voteNum = voteBtn.querySelector('.vote-num');
        
        voteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (state.selectMode) return;
          
          const photoId = card.dataset.id;
          const currentVotes = parseInt(voteNum.textContent) || 0;
          
          if (state.votedIds.includes(photoId)) {
            // 투표 취소 - 즉시 UI 업데이트
            card.classList.remove('voted');
            card.classList.add('unvote-animation');
            voteBtn.classList.remove('voted');
            voteNum.textContent = Math.max(0, currentVotes - 1);
            setTimeout(() => { card.classList.remove('unvote-animation'); }, 400);
          } else {
            // 투표 - 즉시 UI 업데이트
            card.classList.add('voted', 'vote-animation');
            voteBtn.classList.add('voted');
            voteNum.textContent = currentVotes + 1;
            setTimeout(() => { card.classList.remove('vote-animation'); }, 400);
          }
          
          // 백그라운드에서 Firebase 저장
          await handleVote(photoId);
        });
      });
    }

    function openModal(imgSrc, imgAlt) {
      let modal = document.getElementById('photoModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'photoModal';
        modal.innerHTML = `
          <div class="modal-backdrop"></div>
          <div class="modal-content">
            <button class="modal-close" aria-label="닫기">×</button>
            <img class="modal-img" src="" alt="" />
          </div>
        `;
        document.body.appendChild(modal);
      }
      const img = modal.querySelector('.modal-img');
      img.src = imgSrc;
      img.alt = imgAlt || '';
      modal.style.display = 'flex';
      setTimeout(() => { modal.classList.add('active'); }, 10);
      
      const close = () => {
        modal.classList.remove('active');
        setTimeout(() => { modal.style.display = 'none'; }, 200);
      };
      modal.querySelector('.modal-close').onclick = close;
      modal.querySelector('.modal-backdrop').onclick = close;
      window.addEventListener('keydown', function escHandler(e) {
        if (e.key === 'Escape') {
          close();
          window.removeEventListener('keydown', escHandler);
        }
      });
    }

    function openSessionModal(mode, session = null) {
      sessionModalTitle.textContent = mode === 'edit' ? '출사 수정' : '출사 추가';
      saveSessionBtn.textContent = mode === 'edit' ? '저장' : '추가';
      if (mode === 'edit' && session) {
        modalSessionLocationInput.value = session.location;
        modalSessionDateInput.value = session.date;
      } else {
        modalSessionLocationInput.value = '';
        modalSessionDateInput.value = '';
      }
      sessionModal.classList.remove('hidden');
      setTimeout(() => sessionModal.classList.add('active'), 10);
      modalSessionLocationInput.focus();
    }

    function closeSessionModal() {
      sessionModal.classList.add('hidden');
      sessionModal.classList.remove('active');
      state.editSessionId = null;
    }

    async function addSession(e) {
      e.preventDefault();
      const location = modalSessionLocationInput.value.trim();
      const date = modalSessionDateInput.value.trim();
      if (!location || !date) return;
      
      const number = sessions.length ? Math.max(...sessions.map(s => s.number)) + 1 : 1;
      const id = `session-${number}`;
      sessions.push({ id, number, location, date, photos: [] });
      await saveSessions();
      state.filter = id;
      closeSessionModal();
      renderNav();
      renderGallery();
    }

    async function saveSessionEdit(e) {
      e.preventDefault();
      const session = sessions.find((item) => item.id === state.editSessionId);
      if (!session) return;
      session.location = modalSessionLocationInput.value.trim() || session.location;
      session.date = modalSessionDateInput.value.trim() || session.date;
      await saveSessions();
      closeSessionModal();
      renderNav();
      renderGallery();
    }

    addSessionBtn.addEventListener('click', () => openSessionModal('add'));
    sessionModalForm.addEventListener('submit', (e) => {
      if (state.editSessionId) {
        saveSessionEdit(e);
      } else {
        addSession(e);
      }
    });
    cancelSessionModal.addEventListener('click', closeSessionModal);
    sessionModal.addEventListener('click', (event) => {
      if (event.target === sessionModal) {
        closeSessionModal();
      }
    });
    galleryMenuBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      state.galleryMenuOpen = !state.galleryMenuOpen;
      renderGalleryMenu();
    });
    galleryMenuPopup.addEventListener('click', (event) => {
      event.stopPropagation();
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        if (!sessionModal.classList.contains('hidden')) {
          closeSessionModal();
        }
        if (state.activeMenuSession) {
          state.activeMenuSession = null;
          renderNav();
        }
        if (state.galleryMenuOpen) {
          state.galleryMenuOpen = false;
          renderGalleryMenu();
        }
      }
    });
    document.addEventListener('click', () => {
      if (state.activeMenuSession) {
        state.activeMenuSession = null;
        renderNav();
      }
      if (state.galleryMenuOpen) {
        state.galleryMenuOpen = false;
        renderGalleryMenu();
      }
    });
    toggleSelectBtn.addEventListener('click', toggleSelectMode);
    deleteSelectedBtn.addEventListener('click', deleteSelectedPhotos);

    galleryWrap.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      if (dragCounter === 1) dragOverlay.classList.add('active');
    });
    galleryWrap.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter === 0) dragOverlay.classList.remove('active');
    });
    galleryWrap.addEventListener('dragover', (e) => { e.preventDefault(); });
    galleryWrap.addEventListener('drop', async (e) => {
      e.preventDefault();
      dragCounter = 0;
      dragOverlay.classList.remove('active');
      const files = e.dataTransfer.files;
      if (!files.length) return;
      const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
      if (!imageFiles.length) {
        alert('이미지 파일만 업로드 가능합니다.');
        return;
      }
      const password = prompt('사진 업로드를 위해 관리자 비밀번호를 입력하세요:');
      if (password !== ADMIN_PASSWORD) {
        alert('비밀번호가 틀렸습니다.');
        return;
      }
      const session = sessions.find((item) => item.id === state.filter);
      if (!session) {
        alert('출사를 먼저 선택해주세요.');
        return;
      }
      
      if (!Array.isArray(session.photos)) {
        session.photos = [];
      }
      
      uploadProgress.classList.add('active');
      uploadMessage.textContent = `업로드 중... (0/${imageFiles.length})`;
      
      for (let i = 0; i < imageFiles.length; i++) {
        uploadMessage.textContent = `업로드 중... (${i + 1}/${imageFiles.length})`;
        const compressedImage = await compressImage(imageFiles[i]);
        const newPhoto = {
          id: `photo-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
          title: '',
          author: '',
          imageUrl: compressedImage,
          votes: 0,
        };
        session.photos.push(newPhoto);
      }
      
      await saveSessions();
      uploadProgress.classList.remove('active');
      alert(`${imageFiles.length}개의 사진이 업로드되었습니다!`);
      renderGallery();
    });

    loadData();
  </script>
</body>
</html>
